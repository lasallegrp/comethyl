on:
  push:
    branches: [master]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxml2-dev libcurl4-openssl-dev libssl-dev \
            libharfbuzz-dev libfribidi-dev libgit2-dev \
            libfontconfig1-dev libfreetype6-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown
          needs: website

      - name: Install Bioconductor dependencies
        shell: Rscript {0}
        run: |
          if (!requireNamespace("BiocManager", quietly = TRUE))
            install.packages("BiocManager")
          BiocManager::install(c(
            "bsseq", "GenomicRanges", "IRanges", "annotatr", "WGCNA",
            "sva", "clusterProfiler", "DOSE", "enrichplot", "fgsea",
            "ReactomePA", "rGREAT", "DelayedMatrixStats", "GenomeInfoDb",
            "SummarizedExperiment", "S4Vectors", "BiocGenerics",
            "preprocessCore", "impute"
          ), ask = FALSE, update = FALSE)

      - name: Build and deploy pkgdown site
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          Rscript -e 'pkgdown::deploy_to_branch(new_process = FALSE)'